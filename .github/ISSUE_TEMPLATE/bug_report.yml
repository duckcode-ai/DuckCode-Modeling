name: Bug report
description: Something doesn't work the way it's documented
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A clear repro case
        shortens the path to a fix. If this is a security issue, please
        report it privately via `security@duckcode.ai` instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, and what actually happened?
      placeholder: |
        I ran `datalex datalex dbt sync ./my-project` and expected ...
        Instead, ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro
      description: Smallest set of files / commands that reproduces the issue.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DataLex version / commit
      description: Output of `datalex --version` or the commit SHA you're on.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python3 --version`.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
