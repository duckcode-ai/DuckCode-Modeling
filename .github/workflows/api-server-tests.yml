name: api-server tests

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "packages/api-server/**"
      - ".github/workflows/api-server-tests.yml"

jobs:
  api-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/api-server/package-lock.json
      - run: npm ci
      - run: npm test
