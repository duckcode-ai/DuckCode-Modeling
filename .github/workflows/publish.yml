name: Publish to PyPI

# Tag-triggered release. Push a semver tag (v0.1.1, v0.2.0, …) and this
# workflow builds the sdist + wheel and uploads to PyPI via OIDC trusted
# publishing. No API tokens stored — PyPI trusts this repo + workflow.
#
# One-time setup on PyPI:
#   1. https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" with:
#        PyPI project name: datalex-cli
#        Owner:             duckcode-ai
#        Repository:        DataLex
#        Workflow:          publish.yml
#        Environment:       pypi
#   3. First tag push creates the project automatically.
#
# Dry-run a release locally first: `python -m build && twine check dist/*`.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build the web-app and copy the dist + the Node api-server into
      # datalex_core so the wheel ships both. `datalex serve` resolves
      # these bundled copies at runtime so `pip install` is the full
      # install path.
      - name: Build web-app + bundle api-server into wheel
        run: |
          set -eux
          python -m pip install --upgrade build
          (cd packages/web-app && npm ci && npm run build)

          dest_core="packages/core_engine/src/datalex_core"
          rm -rf "$dest_core/_webapp" "$dest_core/_server"
          mkdir -p "$dest_core/_webapp" "$dest_core/_server"
          cp -R packages/web-app/dist/. "$dest_core/_webapp/"
          # Ship the full runtime api-server tree. index.js imports sibling
          # modules such as ai/providerMeta.js, so copying only index.js makes
          # the installed wheel fail at ModuleJob.link with ERR_MODULE_NOT_FOUND.
          cp -R packages/api-server/. "$dest_core/_server/"
          rm -rf "$dest_core/_server/test" "$dest_core/_server/node_modules"
          (cd "$dest_core/_server" && npm ci --omit=dev && rm -f package-lock.json)

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify bundled schemas are in the wheel
        run: |
          python - <<'PY'
          import pathlib, zipfile, sys
          wheel = next(pathlib.Path("dist").glob("datalex_cli-*-py3-none-any.whl"))
          with zipfile.ZipFile(wheel) as z:
              schemas = [n for n in z.namelist() if n.startswith("datalex_core/_schemas/datalex/") and n.endswith(".json")]
          if len(schemas) < 9:
              print(f"FAIL: expected >= 9 bundled schemas, found {len(schemas)}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(schemas)} schemas bundled in {wheel.name}")
          PY

      - name: Verify bundled web-app + server are in the wheel
        run: |
          python - <<'PY'
          import pathlib, zipfile, sys
          wheel = next(pathlib.Path("dist").glob("datalex_cli-*-py3-none-any.whl"))
          with zipfile.ZipFile(wheel) as z:
              names = z.namelist()
          server = [n for n in names if n.startswith("datalex_core/_server/")]
          webapp = [n for n in names if n.startswith("datalex_core/_webapp/")]
          if not any(n.endswith("_server/index.js") for n in server):
              print(f"FAIL: _server/index.js missing from wheel ({len(server)} entries)", file=sys.stderr)
              sys.exit(1)
          required_server_files = [
              "datalex_core/_server/ai/providerMeta.js",
              "datalex_core/_server/ai/providers.js",
              "datalex_core/_server/ai/agentStore.js",
          ]
          missing = [n for n in required_server_files if n not in names]
          if missing:
              print(f"FAIL: bundled api-server missing runtime modules: {missing}", file=sys.stderr)
              sys.exit(1)
          if not any(n.endswith("_webapp/index.html") for n in webapp):
              print(f"FAIL: _webapp/index.html missing from wheel ({len(webapp)} entries)", file=sys.stderr)
              sys.exit(1)
          print(f"OK: bundled server={len(server)} files, webapp={len(webapp)} files")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distribution
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/datalex-cli
    permissions:
      id-token: write

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-distribution
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
