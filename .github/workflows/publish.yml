name: Publish to PyPI

# Tag-triggered release. Push a semver tag (v0.1.1, v0.2.0, …) and this
# workflow builds the sdist + wheel and uploads to PyPI via OIDC trusted
# publishing. No API tokens stored — PyPI trusts this repo + workflow.
#
# One-time setup on PyPI:
#   1. https://pypi.org/manage/account/publishing/
#   2. Add a "pending publisher" with:
#        PyPI project name: datalex-cli
#        Owner:             duckcode-ai
#        Repository:        DataLex
#        Workflow:          publish.yml
#        Environment:       pypi
#   3. First tag push creates the project automatically.
#
# Dry-run a release locally first: `python -m build && twine check dist/*`.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify bundled schemas are in the wheel
        run: |
          python - <<'PY'
          import pathlib, zipfile, sys
          wheel = next(pathlib.Path("dist").glob("datalex_cli-*-py3-none-any.whl"))
          with zipfile.ZipFile(wheel) as z:
              schemas = [n for n in z.namelist() if n.startswith("datalex_core/_schemas/datalex/") and n.endswith(".json")]
          if len(schemas) < 9:
              print(f"FAIL: expected >= 9 bundled schemas, found {len(schemas)}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(schemas)} schemas bundled in {wheel.name}")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distribution
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/datalex-cli
    permissions:
      id-token: write

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-distribution
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
