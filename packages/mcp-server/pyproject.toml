[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "datalex-mcp"
version = "0.1.0"
description = "MCP (Model Context Protocol) stdio server exposing DataLex docs, models, doc-blocks, and readiness review as tools for Claude Desktop / Cursor / Code."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "DuckCode AI" }]
dependencies = [
  "mcp>=1.0.0",
  "PyYAML>=6.0",
  # `datalex-core` is consumed via path during development; in the
  # published wheel we'd pin a release. For now keep it loose so an
  # editable monorepo install works without extra wiring.
]

[project.scripts]
datalex-mcp = "datalex_mcp.server:main"

[tool.setuptools.packages.find]
where = ["src"]
